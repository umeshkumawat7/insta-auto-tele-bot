version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insta-bot-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - downloads:/app/downloads
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  downloads:
